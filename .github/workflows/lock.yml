name: "Flake.lock: update Nix dependencies"
on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: "0 0 * * *" # runs daily at 00:00
jobs:
  nix-flake-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@e1ac057965e5be579300ea6beb1f0e9a8a607344 #master
      - name: Set git authors
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"
      - run: nix run ".#runCommand" -- lock
      - name: Push to repo
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          title: "Update nix inputs" # Title of PR to be created
          branch: update_flake_lock_action
          labels: | # Labels to be set on the PR
            dependencies
            automated
  call-flake-checks:
    permissions:
      contents: read
      id-token: write
    needs: nix-flake-update
    uses: ./.github/workflows/checks.yml
    secrets:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    with:
      ref: "update_flake_lock_action"
