name: "Build installer ISO images"
on:
  workflow_dispatch:
jobs:
  images:
    name: "Build machine images"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        machine: [tjmaxxer, disko-elysium, msi-colgate]
    steps:
      - name: Maximize Runner Space
        uses: justinthelaw/maximize-github-runner-space@master
        with:
          remove-android: "true"
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Build ${{ matrix.machine }}
        id: build-iso
        run: |
          nix build  --max-jobs 64 --max-substitution-jobs 64  --cores 0  \
          --accept-flake-config --out-link installer-${{ matrix.machine }} \
          .#nixosConfigurations.${{ matrix.machine }}.config.system.build.images.iso-installer
          ls installer-${{ matrix.machine }}/iso/*
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: trunk
          files: installer-${{ matrix.machine }}/iso/*
