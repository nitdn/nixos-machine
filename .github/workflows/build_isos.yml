name: "Build installer ISO images"
on:
  push:
jobs:
  images:
    name: "Build a minimal image"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - run: |
          nix build .#isoBootstrap
      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: result/iso/*
