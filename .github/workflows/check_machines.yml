name: "Test machines"
on:
  # push:
  workflow_call:
jobs:
  tests:
    name: "Build machines"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@bea8a506457e59a062336709ee10a5677fd9a59e
        with:
          name: machines
          # If you chose signing key for write access
          # signingKey: "${{ secrets.CACHIX_SIGNING_KEY }}"
          # If you chose API tokens for write access OR if you have a private cache
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: cachix use nix-community
      - name: Build machines
        shell: nix shell github:Mic92/nix-fast-build --command bash --noprofile --norc -eo pipefail {0}
        run: |
          for machine in tjmaxxer disko-elysium msi-colgate; do
            nix-fast-build --no-nom --skip-cached --cachix-cache machines \
            --flake=.#nixosConfigurations."${machine}".config.system.build.toplevel
          done
