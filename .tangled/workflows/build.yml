when:
  - event: ["push", "manual"]
    branch: ["main", "push-*"]
  # - event: ["pull_request"]
  #   branch: ["main"]

engine: "nixery"

# using the default values
clone:
  skip: false
  depth: 1
  submodules: false

dependencies:
  nixpkgs:
    - cachix
    - nix-fast-build
    - gnused

steps:
  - name: "Bruteforce nix sandbox"
    command: |
      sed -i 's/false/true/' /etc/nix/nix.conf

  - name: "Set extra substituters and prefetch inputs"
    environment:
      USER: "root"
    command: |
      cachix use nix-community
      cachix use machines
      nix flake prefetch-inputs .
      rm -rf /homeless-shelter

  - name: "Check flake"
    command: |
      nix-fast-build --no-nom --skip-cached \
      --cachix-cache machines \
      --flake ".#checks.x86_64-linux"
