name: "Flake.lock: update Nix dependencies"
on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: "0 0 * * *" # runs daily at 00:00
jobs:
  nix-flake-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@e1ac057965e5be579300ea6beb1f0e9a8a607344 #master
      - name: Set git authors and branch
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"
          git switch --create update_flake_lock_action
      - run: nix run ".#runCommand" -- lock
      - name: Push to repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh auth setup-git
          git push --set-upstream origin update_flake_lock_action --force
          gh pr create --head update_flake_lock_action \
          --title "Update inputs" \
          --body "TODO: Actually figure out how to put the git log here" \
          --label dependencies \
          --label automated
  call-flake-checks:
    permissions:
      contents: read
      id-token: write
    needs: nix-flake-update
    uses: ./.github/workflows/checks.yml
