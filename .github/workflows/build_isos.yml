name: "Build installer ISO images"
on:
  push:
jobs:
  images:
    name: "Build a minimal image"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe #master
      - run: |
          nix build .#isoBootstrap
      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        if: github.ref_type == 'tag'
        with:
          files: result/iso/*
