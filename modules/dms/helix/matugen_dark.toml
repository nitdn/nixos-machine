# Helix Theme Template using Material You with improved contrast

# --- Syntax Elements ---

"attribute" = "#ffb4ab"
"type" = "#f9dedc"
"type.enum.variant" = "#f9dedc"
"constructor" = "#8c1d18"

"constant" = "#f9dedc"
"constant.character" = "#f9dedc"
"constant.character.escape" = "#322826"

"string" = "#ffb4ab"
"string.regexp" = "#322826"
"string.special" = "#8c1d18"
"string.special.symbol" = "#f2b8b5"

"comment" = { fg = "#d8c2bf", modifiers = ["italic"] }

"variable" = "#f1dedc"
"variable.parameter" = { fg = "#8c1d18", modifiers = ["italic"] }
"variable.builtin" = "#f2b8b5"
"variable.other.member" = "#ffb4ab"

"label" = "#8c1d18"

"punctuation" = "#d8c2bf"
"punctuation.special" = "#f9dedc"

"keyword" = "#ffb4ab"
"keyword.control.conditional" = { fg = "#ffb4ab", modifiers = ["italic"] }

"operator" = "#f9dedc"

"function" = "#ffb4ab"
"function.macro" = "#8c1d18"

"tag" = "#ffb4ab"
"namespace" = { fg = "#f9dedc", modifiers = ["italic"] }

"special" = "#ffb4ab"

# --- Markup ---

"markup.heading.1" = "#f2b8b5"
"markup.heading.2" = "#ffb4ab"
"markup.heading.3" = "#f9dedc"
"markup.heading.4" = "#f9dedc"
"markup.heading.5" = "#8c1d18"
"markup.heading.6" = "#000000"

"markup.list" = "#f9dedc"
"markup.list.unchecked" = "#d8c2bf"
"markup.list.checked" = "#8c1d18"

"markup.bold" = { fg = "#ffb4ab", modifiers = ["bold"] }
"markup.italic" = { fg = "#f9dedc", modifiers = ["italic"] }

"markup.link.url" = { fg = "#ffb4ab", modifiers = ["italic", "underlined"] }
"markup.link.text" = "#8c1d18"
"markup.link.label" = "#f9dedc"
"markup.raw" = "#f1dedc"
"markup.quote" = "#322826"

# --- Diff ---

"diff.plus" = "#f9dedc"
"diff.minus" = "#f2b8b5"
"diff.delta" = "#ffb4ab"

# --- UI Elements ---

"ui.background" = { fg = "#f1dedc", bg = "none" }

"ui.linenr" = { fg = "#d8c2bf" }
"ui.linenr.selected" = { fg = "#8c1d18" }

"ui.statusline" = { fg = "#f1dedc", bg = "none" }
"ui.statusline.inactive" = { fg = "#d8c2bf", bg = "none" }
"ui.statusline.normal" = { fg = "#1a1110", bg = "none", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "#1a1110", bg = "none", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "#1a1110", bg = "none", modifiers = ["bold"] }

"ui.popup" = { fg = "#f1dedc", bg = "none" }
"ui.window" = { fg = "#d8c2bf" }
"ui.help" = { fg = "#d8c2bf", bg = "none" }

"ui.bufferline" = { fg = "#d8c2bf", bg = "none" }
"ui.bufferline.active" = { fg = "#000000", bg = "#ffb4ab", underline = { color = "#ffb4ab", style = "line" } }
"ui.bufferline.background" = { bg = "none" }

"ui.text" = "#f1dedc"
"ui.text.focus" = { fg = "#ffb4ab", bg = "none", modifiers = ["bold"] }
"ui.text.inactive" = { fg = "#d8c2bf" }
"ui.text.directory" = { fg = "#ffb4ab" }

"ui.virtual" = "#d8c2bf"
"ui.virtual.ruler" = { bg = "none" }
"ui.virtual.indent-guide" = "#1a1110"
"ui.virtual.inlay-hint" = { fg = "#d8c2bf", bg = "none" }
"ui.virtual.jump-label" = { fg = "#8c1d18", modifiers = ["bold"] }

"ui.selection" = { bg = "#534341" }

"ui.cursor" = { fg = "#1a1110", bg = "#f1dedc" }
"ui.cursor.primary" = { fg = "#1a1110", bg = "#8c1d18" }
"ui.cursor.match" = { fg = "#f1dedc", modifiers = ["bold"] }

"ui.highlight" = { bg = "#322826", modifiers = ["bold"] }

"ui.menu" = { fg = "#f1dedc", bg = "none" }
"ui.menu.selected" = { fg = "#ffb4ab", bg = "none", modifiers = ["bold"] }

# --- Diagnostics ---

"diagnostic.error" = { fg = "#f2b8b5", underline = { color = "#f2b8b5", style = "curl" } }
"diagnostic.warning" = { fg = "#f9dedc", underline = { color = "#f9dedc", style = "curl" } }
"diagnostic.info" = { fg = "#f9dedc", underline = { color = "#f9dedc", style = "curl" } }
"diagnostic.hint" = { fg = "#322826", underline = { color = "#322826", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }

# --- Fallbacks (non-template usage) ---

error = "#f2b8b5"
warning = "#f9dedc"
info = "#ffb4ab"
hint = "#f9dedc"
