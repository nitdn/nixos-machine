name: "All nixos-machines checks"
on:
  push:
  workflow_call:
    secrets:
      CACHIX_AUTH_TOKEN:
        required: true
    inputs:
      ref:
        required: false
        type: string
jobs:
  check_flake:
    name: "Run flake checks"
    runs-on: ubuntu-latest
    environment: cachix
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref }}
      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # master
        with:
          name: machines
          # If you chose signing key for write access
          # signingKey: "${{ secrets.CACHIX_SIGNING_KEY }}"
          # If you chose API tokens for write access OR if you have a private cache
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-community
          # skipPush: true
      # - uses: DeterminateSystems/magic-nix-cache-action@3c034b51a9deec0a09ef1df8b436ac5db50fae94 # main
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never
      - name: Check flakes
        shell: "nix shell nixpkgs#nix-fast-build -c bash -e {0}"
        run: |
          nix-fast-build --no-nom --skip-cached \
          --option accept-flake-config true --cachix-cache machines \
          --eval-max-memory-size 12288 --eval-workers 8 \
  check_ifd:
    name: "Run IFD checks"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref }}
      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Check IFD
        run: "nix flake check --no-build --no-allow-import-from-derivation"
