name: "All nixos-machines checks"
on:
  push:
jobs:
  check_flake:
    name: "Run flake checks"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@51f3067b56fe8ae331890c77d4e454f6d60615ff # v31
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c
        with:
          name: machines
          # If you chose signing key for write access
          # signingKey: "${{ secrets.CACHIX_SIGNING_KEY }}"
          # If you chose API tokens for write access OR if you have a private cache
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-community
          skipPush: true
          # (optional) pre-build the shell separately to avoid skewing the run time of the next
          # step and have clear point of failure should the shell fail to build
      - name: Pre-build devShell
        run: nix build --no-link .#devShells."$(nix eval --impure --raw --expr 'builtins.currentSystem')".default
      - name: Check flakes
        shell: "nix develop -c bash -e {0}"
        run: |
          nix-fast-build --no-nom --skip-cached \
          --option accept-flake-config true --cachix-cache machines \
          # --eval-max-memory-size 12288 --eval-workers 8 \
          # --flake ".#checks.$(nix eval --raw --impure --expr 'builtins.currentSystem')"
  check_ifd:
    name: "Run IFD checks"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@51f3067b56fe8ae331890c77d4e454f6d60615ff # v31
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c
        with:
          name: machines
          # If you chose signing key for write access
          # signingKey: "${{ secrets.CACHIX_SIGNING_KEY }}"
          # If you chose API tokens for write access OR if you have a private cache
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Check IFD
        run: "nix flake check --no-build --no-allow-import-from-derivation"
