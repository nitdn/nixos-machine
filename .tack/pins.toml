# tack pins
# edit by hand or with tack add / rm / alias
# nix reads pins.lock.json
# this file drives tack update

# shorturl schemes
# scheme rest expands rest into {path}
[shorturls]
gh = "github:{path}"

# all_follow maps input names to the top-level pin they follow
# opt out per-input with exclude_follow
[all_follow]
nixpkgs = "nixpkgs"
# nixpkgs = ["nixpkgs-stable", "nixpkgs-unstable"]

# inputs.<name> fields
#   url             required, shorturl ok, ?rev=<sha> pins an exact commit
#   type            flake (default), fetch, or fixed
#   flake           legacy false means type = "fetch"
#   follows         { child = "pin" } override map
#   exclude_follow  all_follow names to skip
#   dir             subdir holding flake.nix
#   submodules      fetch git submodules
#   unpack          fixed-only tarball or file
[inputs]

[inputs.affinity-nix]
url = "github:mrshmllow/affinity-nix"

[inputs.affinity-nix.follows]
flake-compat = ""
flake-parts = "flake-parts"
nixpkgs = "nixpkgs"
treefmt-nix = "treefmt-nix"

[inputs.disko]
url = "github:nix-community/disko"

[inputs.disko.follows]
nixpkgs = "nixpkgs"

[inputs.flake-parts]
url = "github:hercules-ci/flake-parts"

[inputs.inshellah]
url = "github:manic-systems/inshellah"

[inputs.microvm]
url = "github:microvm-nix/microvm.nix"

[inputs.microvm.follows]
nixpkgs = "nixpkgs"

[inputs.nix-devshells]
url = "git+https://codeberg.org/nitdn/nix-devshells.git"

[inputs.nix-devshells.follows]
nixpkgs = "nixpkgs"
wrappers = "wrappers"

[inputs.nix-index-database]
url = "github:nix-community/nix-index-database"

[inputs.nix-index-database.follows]
nixpkgs = "nixpkgs"

[inputs.nixpkgs]
url = "github:nixos/nixpkgs/nixos-unstable"

[inputs.nufmt]
url = "github:nushell/nufmt"

[inputs.nufmt.follows]
nixpkgs = "nixpkgs"
treefmt-nix = "treefmt-nix"

[inputs.sops-nix]
url = "github:Mic92/sops-nix"

[inputs.sops-nix.follows]
nixpkgs = "nixpkgs"

[inputs.steam-presence]
url = "github:JustTemmie/steam-presence"

[inputs.steam-presence.follows]
nixpkgs = "nixpkgs"

[inputs.treefmt-nix]
url = "github:numtide/treefmt-nix"

[inputs.treefmt-nix.follows]
nixpkgs = "nixpkgs"

[inputs.wrappers]
url = "github:BirdeeHub/nix-wrapper-modules"

[inputs.wrappers.follows]
nixpkgs = "nixpkgs"

[inputs.zen-browser]
url = "github:youwen5/zen-browser-flake"

[inputs.zen-browser.follows]
nixpkgs = "nixpkgs"

[inputs.tack]
url = "gh:manic-systems/tack"

[tack]
recomposable = true
