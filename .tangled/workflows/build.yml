when:
  - event: ["push", "manual"]
    branch: ["main", "push-*"]
  # - event: ["pull_request"]
  #   branch: ["main"]

engine: "microvm"

# using the default values
clone:
  skip: false
  depth: 1
  submodules: false

registry:
  nixpkgs: github:nixos/nixpkgs/nixos-unstable

dependencies:
  - cachix
  - nix-fast-build

steps:
  - name: "Check flake"
    command: |
      nix-fast-build --no-nom --skip-cached --cachix-cache machines \
      --flake .#checks.x86_64-linux
