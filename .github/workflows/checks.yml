name: "All nixos-machines checks"
on:
  push:
  workflow_call:
    secrets:
      CACHIX_AUTH_TOKEN:
        required: true
    inputs:
      ref:
        required: false
        type: string
jobs:
  check_flake:
    name: "Run flake checks"
    runs-on: ubuntu-latest
    environment: cachix
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref }}
      - uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7 # main
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # master
        with:
          name: machines
          # If you chose signing key for write access
          # signingKey: "${{ secrets.CACHIX_SIGNING_KEY }}"
          # If you chose API tokens for write access OR if you have a private cache
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-community
          skipPush: true
          useDaemon: false
      - name: Check flakes
        shell: "nix shell nixpkgs#nix-fast-build -c bash -e {0}"
        run: |
          nix-fast-build --no-nom --skip-cached \
          --option accept-flake-config true --cachix-cache machines \
          --eval-max-memory-size 12288 --eval-workers 8 \
